name: Deploy Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.*'
      - 'tsconfig*.json'
      - 'src/**'
      - 'public/**'
      - '.github/workflows/deploy-frontend.yml'

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # ЯВНО ставим pnpm (без Corepack)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          run_install: false

      - name: Show versions
        run: |
          node -v
          pnpm -v

      - name: Install deps (try frozen, else soft)
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
          else
            pnpm install
          fi

      - name: Build
        env:
          VITE_API_URL: https://api.technofame.store
        run: |
          pnpm run build
          test -f dist/index.html

      - name: Upload dist via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}   # deploy
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "dist/*"
          target: "/home/${{ secrets.SSH_USER }}/frontend_upload"
          overwrite: true

      - name: Atomic deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}   # deploy
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            if [ -d "/home/${USER}/frontend_upload/dist" ]; then
              shopt -s dotglob || true
              mv /home/${USER}/frontend_upload/dist/* /home/${USER}/frontend_upload/ && rmdir /home/${USER}/frontend_upload/dist
            fi
            sudo -n /opt/deploy/deploy_frontend.sh
            test -f /var/www/frontend/index.html
            code=$(curl -sk -o /dev/null -w "%{http_code}" https://technofame.store/)
            echo "frontend status: $code"
            [ "$code" = "200" ] || [ "$code" = "304" ] || exit 1
